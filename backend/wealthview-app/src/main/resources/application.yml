spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wealthview
    username: wv_app
    password: ${DB_PASSWORD:wv_dev_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 500
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: wealthview
      environment: ${spring.profiles.active:unknown}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-must-be-at-least-32-characters-long}
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: https://finnhub.io
    rate-limit-ms: 1100
  zillow:
    enabled: false
    timeout-ms: 10000
    rate-limit-ms: 5000
    sync-cron: "0 0 6 * * SUN"
