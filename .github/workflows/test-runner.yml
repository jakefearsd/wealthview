name: Test Runner

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: self-hosted
    steps:
      - name: Java
        run: java --version

      - name: Maven
        run: mvn --version

      - name: Python
        run: python --version

      - name: Node
        run: node --version || echo "Node not installed"

      - name: All tools verified
        run: echo "All build tools are working!"
