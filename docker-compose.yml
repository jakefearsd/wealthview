services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wealthview
      POSTGRES_USER: wv_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wv_dev_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wv_app -d wealthview"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wealthview
      SPRING_DATASOURCE_USERNAME: wv_app
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-wv_dev_pass}
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-production-secret-key-must-be-at-least-32-characters}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-admin123}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
